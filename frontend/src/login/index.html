<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Projeto ETM</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <main class="page">
    <section class="card" aria-labelledby="login-title">
      <div class="brand">
        <!-- LOGOTIPO -->
        <img src="../assets/img/logo-grupo-ka.png" class="brand-logo" alt="GRUPO KA" />
        <h1 id="login-title" class="title">Acesse sua conta</h1>
        <p class="subtitle">Use seu e‑mail corporativo para entrar</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" inputmode="email"
                 autocomplete="username" placeholder="seu.email@empresa.com"
                 required aria-describedby="email-error" />
          <small id="email-error" class="error" role="alert"></small>
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password"
                   autocomplete="current-password" placeholder="••••••••"
                   minlength="6" required aria-describedby="password-error" />
            <button type="button" class="toggle-pass" aria-label="Mostrar/ocultar senha">👁️</button>
          </div>
          <small id="password-error" class="error" role="alert"></small>
        </div>

        <div class="actions">
          <label class="remember">
            <input type="checkbox" id="rememberMe" /> Lembrar de mim
          </label>
          <a class="link" href="#" aria-disabled="true">Esqueceu a senha?</a>
        </div>

        <button class="btn" type="submit">Entrar</button>
        <p class="hint">Dica: pressione <kbd>Enter</kbd> para enviar</p>
      </form>

      <footer class="footer">
        <button id="themeToggle" class="theme-btn" type="button" aria-pressed="false">
          Alternar tema
        </button>
      </footer>
    </section>

    <aside class="side-illustration" aria-hidden="true"></aside>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>

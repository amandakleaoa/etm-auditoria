<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - Projeto ETM</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <img src="../assets/img/logo-grupo-ka.png" alt="GRUPO KA" class="brand-logo">
        <span class="brand-name">ETM</span>
      </div>

      <nav class="menu">
        <a class="item active" href="#"><span>Dashboard</span></a>
        <a class="item" href="#" aria-disabled="true"><span>Tarefas</span></a>
        <a class="item" href="#" aria-disabled="true"><span>Categorias</span></a>
        <a class="item" href="#" aria-disabled="true"><span>Tags</span></a>
        <a class="item" href="#" aria-disabled="true"><span>Histórico</span></a>
      </nav>

      <div class="spacer"></div>

      <nav class="menu">
        <a class="item" href="#" aria-disabled="true"><span>Configurações</span></a>
        <button id="logoutBtn" class="item danger" type="button"><span>Sair</span></button>
      </nav>
    </aside>

    <!-- Conteúdo -->
    <main class="content">
      <!-- Topbar -->
      <header class="topbar">
        <form class="search" role="search">
          <input type="search" placeholder="Buscar tarefas, tags, categorias..." aria-label="Buscar" />
        </form>

        <div class="top-actions">
          <button class="icon-btn" title="Notificações" type="button">🔔</button>
          <button class="icon-btn" title="Preferências" type="button">⚙️</button>
          <div id="userChip" class="user-chip" aria-label="Usuário autenticado">AL</div>
        </div>
      </header>

      <!-- Cabeçalho de página -->
      <section class="page-head">
        <div>
          <h1 class="title">Dashboard</h1>
          <p class="subtitle">Visão geral do fluxo de trabalho</p>
        </div>
        <button class="primary-btn" type="button" id="newTaskBtn">+ Nova Tarefa</button>
      </section>

      <!-- Cards -->
      <section class="stats">
        <article class="card stat">
          <div class="stat-head">Total de Tarefas</div>
          <div class="stat-value" id="totalTasks">128</div>
          <div class="stat-trend positive">▲ +9% esta semana</div>
        </article>

        <article class="card stat">
          <div class="stat-head">Concluídas</div>
          <div class="stat-value" id="doneTasks">86</div>
          <div class="stat-trend stable">• estável</div>
        </article>

        <article class="card stat">
          <div class="stat-head">Pendentes</div>
          <div class="stat-value" id="pendingTasks">34</div>
          <div class="stat-trend negative">▼ -3% atraso</div>
        </article>

        <article class="card stat">
          <div class="stat-head">Atrasadas</div>
          <div class="stat-value" id="lateTasks">8</div>
          <div class="stat-trend warn">! atenção</div>
        </article>
      </section>

      <!-- Gráfico -->
      <section class="card chart-box">
        <div class="chart-head">
          <h2 class="chart-title">Evolução semanal</h2>
          <span class="badge">Últimas 6 semanas</span>
        </div>
        <canvas id="weeklyChart" height="140"></canvas>
      </section>

    </main>
  </div>

  <!-- Chart.js via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
